name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: Agent name
        required: true
        default: thanhchien
      agent_description:
        description: Agent description
        required: true
        default: thanhchien AI Agent

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install ClawHub skill
        run: npx clawhub@latest install verified-agent-identity --force

      - name: Install dependencies
        run: npm install -g npm@11.13.0

      - name: Create Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          node scripts/manualLinkHumanToAgent.js \
          --challenge "{\"name\":\"${{ github.event.inputs.agent_name }}\",\"description\":\"${{ github.event.inputs.agent_description }}\"}"
